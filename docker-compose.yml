# engram cloud server — stack productivo
#
# Versiones pinneadas (ver SECURITY.md y docs/ARCHITECTURE.md
# version compat matrix).

services:
  postgres:
    # 16.13-alpine: incluye fixes CVE-2026-2003/05/06/07 + fixes de regresión
    # introducidos en 16.12 al parchear esas CVEs.
    # NO bajar a 16.11 o anterior sin entender el riesgo.
    image: postgres:16.13-alpine
    container_name: engram-cloud-postgres
    restart: unless-stopped
    env_file: [.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - engram-cloud-pg:/var/lib/postgresql/data
    # Postgres NO se expone fuera del bridge interno.

  cloud:
    # Pinneado a versión específica (NO :latest) para builds reproducibles.
    # Para verificar updates: ./scripts/check-updates.sh
    image: ghcr.io/gentleman-programming/engram:1.15.10
    container_name: engram-cloud
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: [.env]
    ports:
      # Bind solo a localhost. Tailscale serve (o Cloudflare Tunnel) lo expone
      # al equipo. Ver docs/PRODUCTION-DEPLOY.md.
      - "127.0.0.1:18080:18080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  engram-cloud-pg:
    name: engram-cloud-pg
