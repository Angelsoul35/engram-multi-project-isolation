name: Validate scripts + docs + CVE gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Re-scan diario para detectar CVEs nuevas en imágenes pinneadas.
    # 06:00 UTC. Si aparecen, el job falla y el operador debe actuar.
    - cron: '0 6 * * *'

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    name: Syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: bash -n
        run: |
          set -e
          fail=0
          for f in scripts/*.sh; do
            echo "→ bash -n $f"
            bash -n "$f" || fail=1
          done
          exit $fail
      - name: python3 py_compile
        run: |
          set -e
          for f in scripts/*.py .github/scripts/*.py; do
            echo "→ py_compile $f"
            python3 -m py_compile "$f"
          done
      - name: YAML validate
        run: |
          set -e
          pip install pyyaml
          for f in $(find . -name '*.yml' -o -name '*.yaml' 2>/dev/null | grep -v '/.git/'); do
            echo "→ yaml validate $f"
            python3 -c "import yaml,sys; yaml.safe_load(open('$f'))"
          done
      - name: JSON validate
        run: |
          set -e
          for f in $(find . -name '*.json' -not -path './.git/*' 2>/dev/null); do
            echo "→ json validate $f"
            python3 -c "import json,sys; json.load(open('$f'))"
          done || echo "(sin .json files)"

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          severity: warning
          ignore_paths: scripts/install-pre-commit.sh

  scripts-quality:
    name: Scripts shebang + set -euo pipefail
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -e
          fail=0
          for f in scripts/*.sh; do
            head -1 "$f" | grep -qE '^#!/usr/bin/env bash' || {
              echo "::error::$f sin shebang #!/usr/bin/env bash"
              fail=1
            }
            grep -q 'set -euo pipefail' "$f" || {
              echo "::error::$f sin 'set -euo pipefail'"
              fail=1
            }
          done
          exit $fail

  docs-no-personal-paths:
    name: Docs sin paths personales
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -e
          forbidden=( '/home/myname' '/home/yourname' )
          fail=0
          for p in "${forbidden[@]}"; do
            hits=$(grep -rEn "$p" docs/ scripts/ README.md 2>&1 | grep -v '^Binary' | grep -v 'install-pre-commit.sh' | grep -v 'validate.yml' || true)
            if [[ -n "$hits" ]]; then
              echo "::error::Paths personales encontrados ($p):"
              echo "$hits"
              fail=1
            fi
          done
          exit $fail

  trivy-gate:
    name: Trivy CVE gate (ZERO CVE postgres + accepted CVEs engram)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Extract pinned images
        id: images
        run: |
          set -e
          POSTGRES_IMG=$(grep -oE 'cgr\.dev/chainguard/postgres[^[:space:]]+' docker-compose.yml | head -1)
          ENGRAM_IMG=$(grep -oE 'ghcr\.io/gentleman-programming/engram[^[:space:]]+' docker-compose.yml | head -1)
          echo "postgres_img=$POSTGRES_IMG" >> $GITHUB_OUTPUT
          echo "engram_img=$ENGRAM_IMG" >> $GITHUB_OUTPUT
          echo "Postgres: $POSTGRES_IMG"
          echo "Engram:   $ENGRAM_IMG"
      - name: Trivy scan postgres (ZERO CVE absolute)
        run: |
          set -e
          IMG="${{ steps.images.outputs.postgres_img }}"
          trivy image --quiet --severity LOW,MEDIUM,HIGH,CRITICAL --format json "$IMG" \
            | python3 .github/scripts/cve-gate.py --zero-cve --image-label postgres
      - name: Trivy scan engram (acceptance gate)
        run: |
          set -e
          IMG="${{ steps.images.outputs.engram_img }}"
          trivy image --quiet --severity LOW,MEDIUM,HIGH,CRITICAL --format json "$IMG" \
            | python3 .github/scripts/cve-gate.py --image-label engram
